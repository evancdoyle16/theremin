<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>CAM·THEREMIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root {
    --green: #00ff88; --green-dim: #00aa55; --green-glow: rgba(0,255,136,0.4);
    --amber: #ffaa00; --amber-glow: rgba(255,170,0,0.4);
    --red: #ff3344; --bg: #050a07; --panel: #0a1410; --border: #1a3025;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg); color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh; height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:1000;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 14px; border-bottom:1px solid var(--border);
    background:var(--panel); flex-shrink:0; position:relative; z-index:10;
  }
  .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:15px; letter-spacing:4px;
    color:var(--green); text-shadow:0 0 10px var(--green-glow),0 0 20px var(--green-glow); }
  .status-row { display:flex; gap:10px; align-items:center; font-size:9px; letter-spacing:1px; }
  .status-dot { width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);transition:all .3s; }
  .status-dot.active { background:var(--green);box-shadow:0 0 8px var(--green-glow); }
  .freq-display { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--amber);
    text-shadow:0 0 8px var(--amber-glow); min-width:90px; text-align:right; }

  .viewport { position:relative; flex:1; overflow:hidden; }
  #video { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transform:scaleX(-1);opacity:0.5;filter:saturate(0) brightness(0.65) contrast(1.2); }
  #overlay { position:absolute;inset:0;width:100%;height:100%; }
  #waveform { position:absolute;bottom:0;left:0;right:0;height:65px;opacity:.85; }
  #no-hand-msg { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:10px;letter-spacing:3px;color:var(--green-dim);opacity:0;transition:opacity .5s;
    text-align:center;pointer-events:none; }
  #no-hand-msg.visible { opacity:.55; }
  #note-display { position:absolute;top:12px;left:50%;transform:translateX(-50%);
    font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:var(--amber);
    text-shadow:0 0 12px var(--amber-glow),0 0 24px var(--amber-glow);
    opacity:0;transition:opacity .1s;pointer-events:none;letter-spacing:3px; }
  #note-display.visible { opacity:1; }

  #loading-screen {
    position:absolute;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;z-index:100;opacity:1;transition:opacity .5s;pointer-events:none;
  }
  #loading-screen.hidden { opacity:0; }
  .loading-label { font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:var(--green-dim); }
  .scanner { width:120px;height:2px;background:var(--border);position:relative;overflow:hidden; }
  .scanner::after {
    content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:linear-gradient(90deg,transparent,var(--green),transparent);
    box-shadow:0 0 8px var(--green-glow);animation:scan 1.2s ease-in-out infinite;
  }
  @keyframes scan { 0%{left:-40%} 100%{left:140%} }
  .brackets { position:relative;width:80px;height:80px;animation:pulse-bracket 1.5s ease-in-out infinite; }
  @keyframes pulse-bracket { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .brackets::before { content:'';position:absolute;top:0;left:0;width:16px;height:16px;
    border-top:2px solid var(--green);border-left:2px solid var(--green);box-shadow:0 0 6px var(--green-glow); }
  .brackets::after { content:'';position:absolute;bottom:0;right:0;width:16px;height:16px;
    border-bottom:2px solid var(--green);border-right:2px solid var(--green);box-shadow:0 0 6px var(--green-glow); }
  .bracket-tr { position:absolute;top:0;right:0;width:16px;height:16px;
    border-top:2px solid var(--green);border-right:2px solid var(--green);box-shadow:0 0 6px var(--green-glow); }
  .bracket-bl { position:absolute;bottom:0;left:0;width:16px;height:16px;
    border-bottom:2px solid var(--green);border-left:2px solid var(--green);box-shadow:0 0 6px var(--green-glow); }

  .controls { background:var(--panel);border-top:1px solid var(--border);
    padding:9px 12px 12px;flex-shrink:0;position:relative;z-index:10; }
  .section-label { font-size:8px;letter-spacing:3px;color:var(--green-dim);margin-bottom:6px; }

  .sound-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px; }
  .sound-btn {
    background:transparent;border:1px solid var(--border);color:var(--green-dim);
    font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.5px;
    padding:6px 2px;cursor:pointer;text-transform:uppercase;transition:all .15s;
    position:relative;line-height:1.3;
  }
  .sound-btn.active {
    background:rgba(0,255,136,0.12);
    border-color:var(--green);color:var(--green);
    box-shadow:0 0 10px var(--green-glow),inset 0 0 10px rgba(0,255,136,0.1);
    text-shadow:0 0 8px var(--green-glow);
  }
  .sound-btn.active::before {
    content:'';position:absolute;top:3px;right:3px;
    width:4px;height:4px;border-radius:50%;
    background:var(--green);box-shadow:0 0 5px var(--green);
  }

  .autotune-row { display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap; }
  .toggle-btn {
    background:transparent;border:1px solid var(--border);color:var(--green-dim);
    font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;
    padding:5px 10px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;
  }
  .toggle-btn.active { border-color:var(--amber);color:var(--amber);
    box-shadow:0 0 8px var(--amber-glow),inset 0 0 8px rgba(255,170,0,0.08); }
  .key-selectors { display:flex;gap:5px;align-items:center;opacity:.3;transition:opacity .2s;pointer-events:none; }
  .key-selectors.enabled { opacity:1;pointer-events:auto; }
  .key-btn {
    background:transparent;border:1px solid var(--border);color:var(--green-dim);
    font-family:'Share Tech Mono',monospace;font-size:8px;
    padding:4px 6px;cursor:pointer;transition:all .15s;min-width:22px;text-align:center;
  }
  .key-btn.active { border-color:var(--amber);color:var(--amber);box-shadow:0 0 6px var(--amber-glow); }
  .mode-btn {
    background:transparent;border:1px solid var(--border);color:var(--green-dim);
    font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;
    padding:4px 8px;cursor:pointer;transition:all .15s;
  }
  .mode-btn.active { border-color:var(--amber);color:var(--amber);box-shadow:0 0 6px var(--amber-glow); }

  .meters { display:flex;gap:8px; }
  .meter { flex:1; }
  .meter-label { font-size:7px;letter-spacing:1.5px;color:var(--green-dim);margin-bottom:3px; }
  .meter-bar { height:6px;background:var(--border);overflow:hidden;border-radius:1px; }
  .meter-fill { height:100%;width:0%;transition:width .08s;border-radius:1px;
    background:linear-gradient(90deg,var(--green-dim),var(--green));
    box-shadow:0 0 4px var(--green-glow); }
  #cutoff-meter { background:linear-gradient(90deg,#aa6600,var(--amber));box-shadow:0 0 4px var(--amber-glow); }

  #start-screen { position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:500;gap:18px; }
  .start-logo { font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(26px,8vw,46px);
    letter-spacing:8px;color:var(--green);text-shadow:0 0 20px var(--green-glow),0 0 40px var(--green-glow);
    animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.65} }
  .start-sub { font-size:10px;letter-spacing:3px;color:var(--green-dim);text-align:center;line-height:2; }
  .start-btn { background:transparent;border:1px solid var(--green);color:var(--green);
    font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;
    padding:13px 30px;cursor:pointer;box-shadow:0 0 20px var(--green-glow);transition:all .2s;margin-top:8px; }
  .start-btn:active { background:rgba(0,255,136,0.1); }
  .hint-text { font-size:9px;color:var(--green-dim);text-align:center;letter-spacing:1px;
    line-height:1.9;max-width:280px;opacity:.65; }

  /* ── LAYOUT WRAPPER ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
  .viewport { min-height:0; }

  /* ── DESKTOP (≥768px): side-by-side ── */
  @media (min-width: 768px) {
    header { padding:10px 24px; }
    .logo { font-size:18px; letter-spacing:6px; }
    .freq-display { font-size:16px; min-width:130px; }
    .status-row { font-size:11px; gap:12px; }
    .status-dot { width:9px; height:9px; }

    .main { flex-direction:row; }
    .viewport { flex:1; border-right:1px solid var(--border); }

    .controls {
      width:300px; flex-shrink:0;
      border-top:none; border-left:1px solid var(--border);
      padding:16px 18px 20px;
      display:flex; flex-direction:column; gap:14px;
      overflow-y:auto;
    }
    .section-label { font-size:9px; letter-spacing:4px; margin-bottom:8px; }
    .sound-grid { grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:0; }
    .sound-btn { font-size:10px; padding:10px 4px; letter-spacing:1px; }
    .autotune-row { gap:10px; margin-bottom:0; }
    .toggle-btn { font-size:10px; padding:7px 14px; }
    .key-btn { font-size:10px; padding:6px 8px; min-width:26px; }
    .mode-btn { font-size:10px; padding:6px 10px; }
    .meters { gap:12px; }
    .meter-label { font-size:9px; letter-spacing:2px; margin-bottom:5px; }
    .meter-bar { height:8px; }
    #note-display { font-size:32px; }
    #no-hand-msg { font-size:13px; letter-spacing:4px; }
    .start-btn:hover { background:rgba(0,255,136,0.08); }
  }

  /* ── WIDE DESKTOP (≥1100px) ── */
  @media (min-width: 1100px) {
    .controls { width:360px; padding:20px 24px 24px; gap:18px; }
    .sound-btn { font-size:11px; padding:12px 4px; }
    .toggle-btn, .key-btn, .mode-btn { font-size:11px; }
    .meter-label { font-size:10px; }
    .meter-bar { height:10px; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <div class="start-logo">CAM·THEREMIN</div>
  <div class="start-sub">CAMERA-BASED INSTRUMENT · V2</div>
  <button class="start-btn" onclick="startApp()">INITIALIZE</button>
  <div class="hint-text">
    DISTANCE → PITCH &nbsp;|&nbsp; L/R → VOLUME<br>
    OPEN / CLOSE HAND → FILTER CUTOFF<br>
    AUTOTUNE SNAPS TO MUSICAL SCALE<br>
    REQUIRES CAMERA ACCESS
  </div>
</div>

<header>
  <div class="logo">CAM·THEREMIN</div>
  <div class="status-row">
    <div class="status-dot" id="hand-dot"></div>
    <span id="hand-status">NO HAND</span>
  </div>
  <div class="freq-display" id="freq-display">--- Hz</div>
</header>

<div class="main">
<div class="viewport">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="waveform"></canvas>
  <div id="no-hand-msg">RAISE HAND TO PLAY</div>
  <div id="note-display">C4</div>
  <div id="loading-screen">
    <div class="brackets">
      <div class="bracket-tr"></div>
      <div class="bracket-bl"></div>
    </div>
    <div class="loading-label" id="loading-label">INITIALIZING</div>
    <div class="scanner"></div>
  </div>
</div>

<div class="controls">
  <div class="section-label">// OSCILLATOR</div>
  <div class="sound-grid">
    <button class="sound-btn active" data-wave="theremin" onclick="setWave(this)">THEREMIN</button>
    <button class="sound-btn" data-wave="sine"     onclick="setWave(this)">SINE</button>
    <button class="sound-btn" data-wave="moog"     onclick="setWave(this)">MOOG</button>
    <button class="sound-btn" data-wave="juno"     onclick="setWave(this)">JUNO</button>
    <button class="sound-btn" data-wave="dx7"      onclick="setWave(this)">DX7 FM</button>
    <button class="sound-btn" data-wave="prophet"  onclick="setWave(this)">PROPHET</button>
    <button class="sound-btn" data-wave="organ"    onclick="setWave(this)">ORGAN</button>
    <button class="sound-btn" data-wave="pad"      onclick="setWave(this)">STR PAD</button>
    <button class="sound-btn" data-wave="bass"     onclick="setWave(this)">BASS</button>
    <button class="sound-btn" data-wave="flute"    onclick="setWave(this)">FLUTE</button>
    <button class="sound-btn" data-wave="square"   onclick="setWave(this)">SQUARE</button>
    <button class="sound-btn" data-wave="sawtooth" onclick="setWave(this)">SAW</button>
  </div>

  <div class="section-label">// AUTOTUNE</div>
  <div class="autotune-row">
    <button class="toggle-btn" id="autotune-btn" onclick="toggleAutotune()">AUTO OFF</button>
    <div class="key-selectors" id="key-selectors">
      <div style="display:flex;gap:3px;" id="key-btns">
        <button class="key-btn active" onclick="setKey(this,'C')">C</button>
        <button class="key-btn" onclick="setKey(this,'D')">D</button>
        <button class="key-btn" onclick="setKey(this,'E')">E</button>
        <button class="key-btn" onclick="setKey(this,'F')">F</button>
        <button class="key-btn" onclick="setKey(this,'G')">G</button>
        <button class="key-btn" onclick="setKey(this,'A')">A</button>
        <button class="key-btn" onclick="setKey(this,'B')">B</button>
      </div>
      <button class="mode-btn active" id="mode-btn" onclick="toggleMode()">MAJ</button>
    </div>
  </div>

  <div class="meters">
    <div class="meter">
      <div class="meter-label">PITCH</div>
      <div class="meter-bar"><div class="meter-fill" id="pitch-meter"></div></div>
    </div>
    <div class="meter">
      <div class="meter-label">VOL</div>
      <div class="meter-bar"><div class="meter-fill" id="vol-meter"></div></div>
    </div>
    <div class="meter">
      <div class="meter-label">CUTOFF</div>
      <div class="meter-bar"><div class="meter-fill" id="cutoff-meter"></div></div>
    </div>
  </div>
</div>
</div><!-- /.main -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════ AUDIO ENGINE ═══════════════════════
let audioCtx, masterGain, preFilterGain, lpFilter, analyser, analyserData;
let oscillators = [];
let currentWave = 'theremin';
let targetFreq = 220, currentFreq = 220;
let targetVol = 0, currentVol = 0;
let isPlaying = false;
let fmMod = null, fmModGain = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  preFilterGain = audioCtx.createGain();
  preFilterGain.gain.value = 1.0;
  lpFilter = audioCtx.createBiquadFilter();
  lpFilter.type = 'lowpass';
  lpFilter.frequency.value = 20000;
  lpFilter.Q.value = 2.0;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyserData = new Float32Array(analyser.fftSize);
  const convolver = audioCtx.createConvolver();
  const revGain = audioCtx.createGain();
  revGain.gain.value = 0.16;
  buildImpulse(convolver, 1.6);
  preFilterGain.connect(lpFilter);
  lpFilter.connect(masterGain);
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
  masterGain.connect(convolver);
  convolver.connect(revGain);
  revGain.connect(audioCtx.destination);
  buildOscillators();
}

function buildImpulse(conv, dur) {
  const rate = audioCtx.sampleRate, len = Math.floor(rate * dur);
  const buf = audioCtx.createBuffer(2, len, rate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.2);
  }
  conv.buffer = buf;
}

function buildOscillators() {
  if (fmMod)     { try { fmMod.stop(); fmMod.disconnect(); } catch(e){} fmMod = null; }
  if (fmModGain) { try { fmModGain.disconnect(); } catch(e){} fmModGain = null; }
  oscillators.forEach(({ osc, g }) => {
    try { g.disconnect(); } catch(e){}
    try { osc.stop(); osc.disconnect(); } catch(e){}
  });
  oscillators = [];
  getOscConfig(currentWave).forEach(cfg => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = cfg.type;
    osc.frequency.value = currentFreq * cfg.ratio;
    if (cfg.detune) osc.detune.value = cfg.detune;
    g.gain.value = cfg.gain;
    osc.connect(g); g.connect(preFilterGain); osc.start();
    oscillators.push({ osc, g, ratio: cfg.ratio });
  });
  if (currentWave === 'dx7') {
    fmMod = audioCtx.createOscillator();
    fmModGain = audioCtx.createGain();
    fmMod.type = 'sine';
    fmMod.frequency.value = currentFreq * 2.0;
    fmModGain.gain.value  = currentFreq * 2.5;
    fmMod.connect(fmModGain);
    if (oscillators[0]) fmModGain.connect(oscillators[0].osc.frequency);
    fmMod.start();
  }
}

function getOscConfig(wave) {
  switch (wave) {
    case 'theremin': return [
      {type:'sine',ratio:1,gain:0.72},{type:'sine',ratio:2,gain:0.22},
      {type:'sine',ratio:3,gain:0.07},{type:'sine',ratio:0.5,gain:0.05}];
    case 'sine':    return [{type:'sine',ratio:1,gain:0.9}];
    case 'moog':    return [
      {type:'sawtooth',ratio:1,gain:0.38},{type:'sawtooth',ratio:1,gain:0.38,detune:8},
      {type:'sawtooth',ratio:1,gain:0.30,detune:-8},{type:'square',ratio:0.5,gain:0.22}];
    case 'juno':    return [
      {type:'sawtooth',ratio:1,gain:0.42},{type:'sawtooth',ratio:1,gain:0.42,detune:6},
      {type:'sawtooth',ratio:1,gain:0.32,detune:-6},{type:'sine',ratio:1,gain:0.14,detune:12}];
    case 'dx7':     return [{type:'sine',ratio:1,gain:0.7}];
    case 'prophet': return [
      {type:'sawtooth',ratio:1,gain:0.38},{type:'square',ratio:1,gain:0.28},
      {type:'sawtooth',ratio:0.5,gain:0.18},{type:'sawtooth',ratio:1,gain:0.22,detune:5}];
    case 'organ':   return [
      {type:'sine',ratio:1,gain:0.55},{type:'sine',ratio:2,gain:0.50},
      {type:'sine',ratio:3,gain:0.28},{type:'sine',ratio:4,gain:0.18},
      {type:'sine',ratio:6,gain:0.10},{type:'sine',ratio:8,gain:0.06}];
    case 'pad':     return [
      {type:'sawtooth',ratio:1,gain:0.26},{type:'sawtooth',ratio:1,gain:0.26,detune:10},
      {type:'sawtooth',ratio:1,gain:0.20,detune:-10},{type:'sawtooth',ratio:2,gain:0.10,detune:5},
      {type:'triangle',ratio:0.5,gain:0.16}];
    case 'bass':    return [
      {type:'sawtooth',ratio:0.5,gain:0.52},{type:'square',ratio:0.5,gain:0.28},
      {type:'sine',ratio:1,gain:0.22}];
    case 'flute':   return [
      {type:'sine',ratio:1,gain:0.68},{type:'sine',ratio:2,gain:0.16},
      {type:'triangle',ratio:3,gain:0.05}];
    case 'square':   return [{type:'square',ratio:1,gain:0.42}];
    case 'sawtooth': return [{type:'sawtooth',ratio:1,gain:0.42}];
    default:         return [{type:'sine',ratio:1,gain:0.9}];
  }
}

function setWave(btn) {
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentWave = btn.dataset.wave;
  if (audioCtx) buildOscillators();
}

function audioLoop() {
  if (!audioCtx) { requestAnimationFrame(audioLoop); return; }
  if (autotuneOn) { currentFreq = targetFreq; }
  else            { currentFreq += (targetFreq - currentFreq) * 0.07; }
  currentVol += (targetVol - currentVol) * 0.07;
  const now = audioCtx.currentTime;
  oscillators.forEach(({ osc, ratio }) => {
    if (autotuneOn) osc.frequency.setValueAtTime(currentFreq * ratio, now);
    else            osc.frequency.setTargetAtTime(currentFreq * ratio, now, 0.025);
  });
  if (fmMod) {
    fmMod.frequency.setTargetAtTime(currentFreq * 2.0, now, 0.025);
    if (fmModGain) fmModGain.gain.setTargetAtTime(currentFreq * 2.5, now, 0.025);
  }
  masterGain.gain.setTargetAtTime(isPlaying ? currentVol * 0.55 : 0, now, 0.06);
  requestAnimationFrame(audioLoop);
}

// ═══════════════════════ AUTOTUNE ═══════════════════════
let autotuneOn = false, currentKey = 'C', currentMode = 'major';
const KEY_ROOT   = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const SCALES     = {major:[0,2,4,5,7,9,11],minor:[0,2,3,5,7,8,10]};
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function snapToScale(freq) {
  const midi = 69 + 12 * Math.log2(freq / 440);
  const root = KEY_ROOT[currentKey], intervals = SCALES[currentMode];
  const midiRound = Math.round(midi);
  let best = midiRound, bestDist = Infinity;
  for (let o = -24; o <= 24; o++) {
    const cand = midiRound + o;
    const deg  = (((cand % 12) + 12) % 12 - root + 12) % 12;
    if (intervals.includes(deg)) {
      const dist = Math.abs(midi - cand);
      if (dist < bestDist) { bestDist = dist; best = cand; }
    }
  }
  const name = NOTE_NAMES[((best%12)+12)%12] + (Math.floor(best/12)-1);
  showNote(name);
  return 440 * Math.pow(2, (best - 69) / 12);
}

let noteTO = null;
function showNote(n) {
  const el = document.getElementById('note-display');
  el.textContent = n; el.classList.add('visible');
  clearTimeout(noteTO);
  noteTO = setTimeout(() => el.classList.remove('visible'), 500);
}

function toggleAutotune() {
  autotuneOn = !autotuneOn;
  const btn = document.getElementById('autotune-btn');
  btn.textContent = autotuneOn ? 'AUTO ON' : 'AUTO OFF';
  btn.classList.toggle('active', autotuneOn);
  document.getElementById('key-selectors').classList.toggle('enabled', autotuneOn);
  if (!autotuneOn) document.getElementById('note-display').classList.remove('visible');
}
function setKey(btn, key) {
  currentKey = key;
  document.querySelectorAll('#key-btns .key-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleMode() {
  const btn = document.getElementById('mode-btn');
  currentMode = currentMode === 'major' ? 'minor' : 'major';
  btn.textContent = currentMode === 'major' ? 'MAJ' : 'MIN';
}

// ═══════════════════════ HAND TRACKING ═══════════════════════
const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx2d   = overlay.getContext('2d');
const wfCvs   = document.getElementById('waveform');
const wfCtx   = wfCvs.getContext('2d');

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
];

function onResults(results) {
  const W = overlay.width, H = overlay.height;
  ctx2d.clearRect(0,0,W,H);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm  = results.multiHandLandmarks[0];
    const pts = lm.map(p => ({x:(1-p.x)*W, y:p.y*H}));

    isPlaying = true;
    document.getElementById('hand-dot').classList.add('active');
    document.getElementById('hand-status').textContent = 'TRACKING';
    document.getElementById('no-hand-msg').classList.remove('visible');

    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    pts.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
    const handSpan = Math.max(maxX-minX, maxY-minY);
    const normSize = Math.min(Math.max(handSpan/(W*0.65),0),1);
    const pitchNorm = 1-normSize;
    const rawFreq = 440 * Math.pow(2, ((35 + pitchNorm*60) - 69) / 12);
    targetFreq = autotuneOn ? snapToScale(rawFreq) : rawFreq;

    const palmX  = pts[0].x;
    const volNorm = Math.min(Math.max(palmX/W,0),1);
    targetVol = volNorm;

    const tips=[8,12,16,20], mcps=[5,9,13,17];
    let extSum=0;
    tips.forEach((t,i)=>{const dx=pts[t].x-pts[mcps[i]].x,dy=pts[t].y-pts[mcps[i]].y;extSum+=Math.sqrt(dx*dx+dy*dy);});
    const curlNorm = Math.min(Math.max((extSum/tips.length/handSpan-0.15)/0.55,0),1);
    const cutoffHz = 80 * Math.pow(18000/80, curlNorm);
    lpFilter.frequency.setTargetAtTime(cutoffHz, audioCtx.currentTime, 0.04);
    lpFilter.Q.setTargetAtTime(1+(1-curlNorm)*10, audioCtx.currentTime, 0.04);

    document.getElementById('pitch-meter').style.width  = (pitchNorm*100)+'%';
    document.getElementById('vol-meter').style.width    = (volNorm*100)+'%';
    document.getElementById('cutoff-meter').style.width = (curlNorm*100)+'%';
    document.getElementById('freq-display').textContent = Math.round(targetFreq)+' Hz';

    ctx2d.strokeStyle = 'rgba(0,255,136,0.28)';
    ctx2d.lineWidth = 1.5;
    CONNECTIONS.forEach(([a,b])=>{
      ctx2d.beginPath();ctx2d.moveTo(pts[a].x,pts[a].y);ctx2d.lineTo(pts[b].x,pts[b].y);ctx2d.stroke();
    });
    const tipSet = new Set([4,8,12,16,20]);
    pts.forEach((p,i)=>{
      const isKey = tipSet.has(i)||i===0;
      ctx2d.beginPath();ctx2d.arc(p.x,p.y,isKey?5:2.5,0,Math.PI*2);
      ctx2d.shadowBlur = isKey?12:5;
      if (tipSet.has(i)) {
        const r=Math.round(255*curlNorm),g2=Math.round(255*(1-curlNorm*0.4));
        ctx2d.fillStyle=`rgb(${r},${g2},${Math.round(136*(1-curlNorm))})`;
        ctx2d.shadowColor=curlNorm>0.5?'#ffaa00':'#00ff88';
      } else {
        ctx2d.fillStyle=isKey?'#00ff88':'rgba(0,255,136,0.42)';
        ctx2d.shadowColor='#00ff88';
      }
      ctx2d.fill(); ctx2d.shadowBlur=0;
    });
    ctx2d.beginPath();ctx2d.moveTo(0,pts[0].y);ctx2d.lineTo(palmX,pts[0].y);
    ctx2d.strokeStyle=`rgba(255,170,0,${0.18+volNorm*0.52})`;
    ctx2d.lineWidth=1;ctx2d.setLineDash([4,7]);ctx2d.stroke();ctx2d.setLineDash([]);

  } else {
    isPlaying = false;
    document.getElementById('hand-dot').classList.remove('active');
    document.getElementById('hand-status').textContent = 'NO HAND';
    document.getElementById('freq-display').textContent = '--- Hz';
    document.getElementById('no-hand-msg').classList.add('visible');
    ['pitch-meter','vol-meter','cutoff-meter'].forEach(id=>document.getElementById(id).style.width='0%');
    if(audioCtx){lpFilter.frequency.setTargetAtTime(20000,audioCtx.currentTime,0.15);lpFilter.Q.setTargetAtTime(1,audioCtx.currentTime,0.15);}
  }
}

// ═══════════════════════ WAVEFORM ═══════════════════════
function drawWaveform() {
  const W=wfCvs.width, H=wfCvs.height;
  wfCtx.clearRect(0,0,W,H);
  if (analyser && isPlaying) {
    analyser.getFloatTimeDomainData(analyserData);
    wfCtx.beginPath();
    wfCtx.strokeStyle='rgba(0,255,136,0.65)';
    wfCtx.lineWidth=1.5; wfCtx.shadowBlur=7; wfCtx.shadowColor='#00ff88';
    const sw=W/analyserData.length; let x=0;
    for(let i=0;i<analyserData.length;i++){
      const y=(analyserData[i]*0.5+0.5)*H;
      i===0?wfCtx.moveTo(x,y):wfCtx.lineTo(x,y); x+=sw;
    }
    wfCtx.stroke(); wfCtx.shadowBlur=0;
  }
  requestAnimationFrame(drawWaveform);
}

// ═══════════════════════ INIT ═══════════════════════
function resizeCanvases() {
  const vp = document.querySelector('.viewport');
  overlay.width=vp.clientWidth; overlay.height=vp.clientHeight;
  wfCvs.width=vp.clientWidth;   wfCvs.height=65;
}
window.addEventListener('resize', resizeCanvases);

// Suspend audio when app is backgrounded or phone sleeps, resume when back
document.addEventListener('visibilitychange', () => {
  if (!audioCtx) return;
  if (document.hidden) {
    isPlaying = false;
    audioCtx.suspend();
  } else {
    audioCtx.resume();
  }
});

async function startApp() {
  document.getElementById('start-screen').style.display='none';
  resizeCanvases();

  // Create AudioContext inside user gesture (required by iOS/Chrome)
  initAudio();
  await audioCtx.resume();

  // iOS speaker routing: the most reliable method is to attach the AudioContext
  // destination stream to a playing <audio> element. This forces iOS to treat
  // the Web Audio session as media playback and route it to the speaker.
  try {
    const dest = audioCtx.createMediaStreamDestination();
    const routeEl = document.createElement('audio');
    routeEl.srcObject = dest.stream;
    routeEl.setAttribute('playsinline', '');
    document.body.appendChild(routeEl);
    await routeEl.play();
    // Also play a brief near-silent tone through it to wake the session
    const routeOsc = audioCtx.createOscillator();
    const routeGain = audioCtx.createGain();
    routeGain.gain.value = 0.001;
    routeOsc.connect(routeGain);
    routeGain.connect(dest);
    routeGain.connect(audioCtx.destination);
    routeOsc.start();
    routeOsc.stop(audioCtx.currentTime + 0.5);
  } catch(e) {}

  audioLoop();
  drawWaveform();

  const hands = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.65});
  hands.onResults(onResults);

  const loader = document.getElementById('loading-screen');
  const loaderLabel = document.getElementById('loading-label');
  const isChromeIOS = /CriOS/i.test(navigator.userAgent);

  if (isChromeIOS) {
    loaderLabel.textContent = 'AWAITING PERMISSION';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      loaderLabel.textContent = 'LOADING CAMERA';
      video.srcObject = stream;
      await video.play();
      loader.classList.add('hidden');
      setTimeout(() => loader.style.display = 'none', 500);
      let last = 0;
      const tick = async (ts) => {
        if (ts - last > 50 && video.readyState >= 2) { last = ts; await hands.send({ image: video }); }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    } catch(err) {
      loaderLabel.textContent = 'CAMERA ACCESS DENIED';
      console.error(err);
    }
  } else {
    loaderLabel.textContent = 'AWAITING PERMISSION';
    const cam = new Camera(video, {
      onFrame: async () => {
        if (!loader.classList.contains('hidden')) {
          loader.classList.add('hidden');
          setTimeout(() => loader.style.display = 'none', 500);
        }
        await hands.send({ image: video });
      },
      width: 640, height: 480, facingMode: 'user'
    });
    cam.start();
  }
}
</script>
