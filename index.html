<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>CAM·THEREMIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-glow: rgba(0,255,136,0.4);
    --amber: #ffaa00;
    --red: #ff3344;
    --bg: #050a07;
    --panel: #0a1410;
    --border: #1a3025;
    --text: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-glow), 0 0 20px var(--green-glow);
  }

  .status-row {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }

  .freq-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--amber);
    text-shadow: 0 0 8px rgba(255,170,0,0.6);
    min-width: 80px;
    text-align: right;
  }

  /* Camera + canvas stack */
  .viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.55;
    filter: saturate(0) brightness(0.7) contrast(1.2);
  }

  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Waveform visualizer */
  #waveform {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    opacity: 0.8;
  }

  /* Controls panel */
  .controls {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 14px 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .controls-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--green-dim);
    margin-bottom: 8px;
  }

  .sound-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .sound-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 7px 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .sound-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .sound-btn.active {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 10px var(--green-glow), inset 0 0 10px rgba(0,255,136,0.1);
  }

  .sound-btn:active::before { opacity: 0.15; }

  .meters {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .meter {
    flex: 1;
  }

  .meter-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }

  .meter-bar {
    height: 4px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    box-shadow: 0 0 6px var(--green-glow);
    width: 0%;
    transition: width 0.08s;
  }

  /* Start overlay */
  #start-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    gap: 20px;
  }

  .start-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 8vw, 48px);
    letter-spacing: 8px;
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .start-sub {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green-dim);
    text-align: center;
    line-height: 1.8;
  }

  .start-btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 14px 32px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px var(--green-glow);
    transition: all 0.2s;
    margin-top: 10px;
  }

  .start-btn:active {
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 30px var(--green-glow);
  }

  .hint-text {
    font-size: 10px;
    color: var(--green-dim);
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.7;
    max-width: 280px;
    opacity: 0.7;
  }

  /* Hand guide lines */
  .crosshair {
    position: absolute;
    pointer-events: none;
  }

  #no-hand-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green-dim);
    opacity: 0;
    transition: opacity 0.5s;
    text-align: center;
    pointer-events: none;
  }
  #no-hand-msg.visible { opacity: 0.6; }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <div class="start-logo">CAM·THEREMIN</div>
  <div class="start-sub">CAMERA-BASED INSTRUMENT<br>VERSION 1.0</div>
  <button class="start-btn" onclick="startApp()">INITIALIZE</button>
  <div class="hint-text">
    DISTANCE FROM CAMERA → PITCH<br>
    LEFT ←→ RIGHT → VOLUME<br>
    REQUIRES CAMERA ACCESS
  </div>
</div>

<!-- Main UI -->
<header>
  <div class="logo">CAM·THEREMIN</div>
  <div class="status-row">
    <div class="status-dot" id="hand-dot"></div>
    <span id="hand-status">NO HAND</span>
  </div>
  <div class="freq-display" id="freq-display">--- Hz</div>
</header>

<div class="viewport">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="waveform"></canvas>
  <div id="no-hand-msg">RAISE HAND TO PLAY</div>
</div>

<div class="controls">
  <div class="controls-label">// OSCILLATOR</div>
  <div class="sound-grid">
    <button class="sound-btn active" data-wave="sine" onclick="setWave(this)">SINE</button>
    <button class="sound-btn" data-wave="theremin" onclick="setWave(this)">THEREMIN</button>
    <button class="sound-btn" data-wave="square" onclick="setWave(this)">SQUARE</button>
    <button class="sound-btn" data-wave="sawtooth" onclick="setWave(this)">SAW</button>
    <button class="sound-btn" data-wave="triangle" onclick="setWave(this)">TRIANGLE</button>
    <button class="sound-btn" data-wave="organ" onclick="setWave(this)">ORGAN</button>
    <button class="sound-btn" data-wave="pad" onclick="setWave(this)">PAD</button>
    <button class="sound-btn" data-wave="bass" onclick="setWave(this)">BASS</button>
  </div>
  <div class="meters">
    <div class="meter">
      <div class="meter-label"><span>PITCH</span><span id="pitch-val">--</span></div>
      <div class="meter-bar"><div class="meter-fill" id="pitch-meter"></div></div>
    </div>
    <div class="meter">
      <div class="meter-label"><span>VOL</span><span id="vol-val">--</span></div>
      <div class="meter-bar"><div class="meter-fill" id="vol-meter"></div></div>
    </div>
    <div class="meter">
      <div class="meter-label"><span>HAND</span><span id="hand-size-val">--</span></div>
      <div class="meter-bar"><div class="meter-fill" id="hand-meter"></div></div>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── Audio Engine ───────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain, filterNode, reverbNode, oscillators = [];
let currentWave = 'sine';
let targetFreq = 220, currentFreq = 220;
let targetVol = 0, currentVol = 0;
let isPlaying = false;
let analyser, analyserData;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;

  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 4000;
  filterNode.Q.value = 1;

  // Simple reverb using convolver
  reverbNode = audioCtx.createConvolver();
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.2;
  createReverb(reverbNode);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyserData = new Float32Array(analyser.fftSize);

  masterGain.connect(filterNode);
  filterNode.connect(analyser);
  filterNode.connect(reverbNode);
  reverbNode.connect(reverbGain);
  reverbGain.connect(audioCtx.destination);
  analyser.connect(audioCtx.destination);

  buildOscillators();
}

function createReverb(convolver) {
  const rate = audioCtx.sampleRate;
  const length = rate * 1.5;
  const buf = audioCtx.createBuffer(2, length, rate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = buf;
}

function buildOscillators() {
  oscillators.forEach(o => { try { o.stop(); } catch(e){} });
  oscillators = [];

  const configs = getOscConfig(currentWave);
  configs.forEach(cfg => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = cfg.type;
    osc.frequency.value = currentFreq * cfg.ratio;
    g.gain.value = cfg.gain;
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    oscillators.push({ osc, gain: g, ratio: cfg.ratio, baseGain: cfg.gain });
  });
}

function getOscConfig(wave) {
  switch(wave) {
    case 'sine':     return [{ type:'sine', ratio:1, gain:1 }];
    case 'theremin': return [
      { type:'sine', ratio:1, gain:0.8 },
      { type:'sine', ratio:2, gain:0.3 },
      { type:'sine', ratio:3, gain:0.1 },
    ];
    case 'square':   return [{ type:'square', ratio:1, gain:0.5 }];
    case 'sawtooth': return [{ type:'sawtooth', ratio:1, gain:0.5 }];
    case 'triangle': return [{ type:'triangle', ratio:1, gain:0.8 }];
    case 'organ':    return [
      { type:'sine', ratio:1, gain:0.6 },
      { type:'sine', ratio:2, gain:0.5 },
      { type:'sine', ratio:4, gain:0.3 },
      { type:'sine', ratio:6, gain:0.15 },
    ];
    case 'pad':      return [
      { type:'sine', ratio:1, gain:0.5 },
      { type:'sine', ratio:1.005, gain:0.5 },
      { type:'triangle', ratio:2, gain:0.2 },
    ];
    case 'bass':     return [
      { type:'sawtooth', ratio:0.5, gain:0.6 },
      { type:'sine', ratio:1, gain:0.4 },
    ];
    default:         return [{ type:'sine', ratio:1, gain:1 }];
  }
}

function setWave(btn) {
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentWave = btn.dataset.wave;
  if (audioCtx) buildOscillators();
}

// Smooth audio update loop
function audioLoop() {
  if (!audioCtx) { requestAnimationFrame(audioLoop); return; }

  const smooth = 0.06;
  currentFreq += (targetFreq - currentFreq) * smooth;
  currentVol += (targetVol - currentVol) * smooth;

  oscillators.forEach(({ osc, ratio }) => {
    osc.frequency.setTargetAtTime(currentFreq * ratio, audioCtx.currentTime, 0.03);
  });

  const vol = isPlaying ? currentVol * 0.6 : 0;
  masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);

  requestAnimationFrame(audioLoop);
}

// ─── Hand Tracking ──────────────────────────────────────────────────────────
const video = document.getElementById('video');
const overlayCanvas = document.getElementById('overlay');
const ctx2d = overlayCanvas.getContext('2d');
const wfCanvas = document.getElementById('waveform');
const wfCtx = wfCanvas.getContext('2d');

let handVisible = false;
let noHandTimer = null;

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function onResults(results) {
  const W = overlayCanvas.width;
  const H = overlayCanvas.height;
  ctx2d.clearRect(0, 0, W, H);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];

    handVisible = true;
    isPlaying = true;
    document.getElementById('hand-dot').classList.add('active');
    document.getElementById('hand-status').textContent = 'TRACKING';
    document.getElementById('no-hand-msg').classList.remove('visible');

    // Mirror x since video is mirrored
    const pts = lm.map(p => ({ x: (1 - p.x) * W, y: p.y * H, z: p.z }));

    // ── Pitch from hand SIZE (spread of landmarks = proxy for distance)
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    pts.forEach(p => {
      minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
      minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
    });
    const handSpan = Math.max(maxX - minX, maxY - minY);
    // Larger span = closer = lower pitch
    const normalizedSize = Math.min(Math.max(handSpan / (W * 0.6), 0), 1);
    const pitchNorm = 1 - normalizedSize; // invert: far away = small = high pitch
    targetFreq = 80 + Math.pow(pitchNorm, 1.5) * 1400; // 80-1480 Hz

    // ── Volume from horizontal position
    const palmX = pts[0].x;
    const volNorm = Math.min(Math.max(palmX / W, 0), 1);
    targetVol = volNorm;

    // Update meters
    document.getElementById('pitch-meter').style.width = (pitchNorm * 100) + '%';
    document.getElementById('vol-meter').style.width = (volNorm * 100) + '%';
    document.getElementById('hand-meter').style.width = (normalizedSize * 100) + '%';
    document.getElementById('pitch-val').textContent = Math.round(targetFreq) + 'Hz';
    document.getElementById('vol-val').textContent = Math.round(volNorm * 100) + '%';
    document.getElementById('hand-size-val').textContent = Math.round(normalizedSize * 100) + '%';
    document.getElementById('freq-display').textContent = Math.round(targetFreq) + ' Hz';

    // Draw skeleton
    ctx2d.strokeStyle = 'rgba(0,255,136,0.35)';
    ctx2d.lineWidth = 1.5;
    CONNECTIONS.forEach(([a, b]) => {
      ctx2d.beginPath();
      ctx2d.moveTo(pts[a].x, pts[a].y);
      ctx2d.lineTo(pts[b].x, pts[b].y);
      ctx2d.stroke();
    });

    // Draw joints
    pts.forEach((p, i) => {
      const isKey = [0,4,8,12,16,20].includes(i);
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, isKey ? 5 : 3, 0, Math.PI * 2);
      ctx2d.fillStyle = isKey ? '#00ff88' : 'rgba(0,255,136,0.5)';
      ctx2d.shadowBlur = isKey ? 12 : 6;
      ctx2d.shadowColor = '#00ff88';
      ctx2d.fill();
      ctx2d.shadowBlur = 0;
    });

    // Draw palm circle
    const cx = pts[0].x, cy = pts[0].y;
    const r = handSpan * 0.28;
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, r, 0, Math.PI * 2);
    ctx2d.strokeStyle = `rgba(0,255,136,${0.15 + volNorm * 0.3})`;
    ctx2d.lineWidth = 1;
    ctx2d.stroke();

    // Horizontal volume line
    const lineY = cy;
    ctx2d.beginPath();
    ctx2d.moveTo(0, lineY);
    ctx2d.lineTo(palmX, lineY);
    ctx2d.strokeStyle = `rgba(255,170,0,${0.3 + volNorm * 0.4})`;
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([4, 6]);
    ctx2d.stroke();
    ctx2d.setLineDash([]);

  } else {
    handVisible = false;
    isPlaying = false;
    document.getElementById('hand-dot').classList.remove('active');
    document.getElementById('hand-status').textContent = 'NO HAND';
    document.getElementById('freq-display').textContent = '--- Hz';
    document.getElementById('no-hand-msg').classList.add('visible');

    document.getElementById('pitch-meter').style.width = '0%';
    document.getElementById('vol-meter').style.width = '0%';
    document.getElementById('hand-meter').style.width = '0%';
    document.getElementById('pitch-val').textContent = '--';
    document.getElementById('vol-val').textContent = '--';
    document.getElementById('hand-size-val').textContent = '--';
  }
}

// ─── Waveform Visualizer ─────────────────────────────────────────────────────
function drawWaveform() {
  const W = wfCanvas.width;
  const H = wfCanvas.height;
  wfCtx.clearRect(0, 0, W, H);

  if (!analyser || !isPlaying) {
    requestAnimationFrame(drawWaveform);
    return;
  }

  analyser.getFloatTimeDomainData(analyserData);

  wfCtx.beginPath();
  wfCtx.strokeStyle = 'rgba(0,255,136,0.7)';
  wfCtx.lineWidth = 1.5;
  wfCtx.shadowBlur = 8;
  wfCtx.shadowColor = '#00ff88';

  const sliceW = W / analyserData.length;
  let x = 0;
  for (let i = 0; i < analyserData.length; i++) {
    const y = (analyserData[i] * 0.5 + 0.5) * H;
    i === 0 ? wfCtx.moveTo(x, y) : wfCtx.lineTo(x, y);
    x += sliceW;
  }
  wfCtx.stroke();
  wfCtx.shadowBlur = 0;

  requestAnimationFrame(drawWaveform);
}

// ─── Resize ──────────────────────────────────────────────────────────────────
function resizeCanvases() {
  const vp = document.querySelector('.viewport');
  overlayCanvas.width = vp.clientWidth;
  overlayCanvas.height = vp.clientHeight;
  wfCanvas.width = vp.clientWidth;
  wfCanvas.height = 70;
}

window.addEventListener('resize', resizeCanvases);

// ─── Init ────────────────────────────────────────────────────────────────────
async function startApp() {
  document.getElementById('start-screen').style.display = 'none';
  resizeCanvases();
  initAudio();
  audioLoop();
  drawWaveform();

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });

  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640,
    height: 480,
    facingMode: 'user'
  });

  camera.start();
}
</script>
</body>
</html>
